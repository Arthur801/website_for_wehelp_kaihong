<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // task 1
        function func1(name) {
            const chrcoord = new Map([
                ["悟空", [0, 0]], 
                ["辛巴", [-3, 3]], 
                ["特南克斯", [1, -2]], 
                ["貝吉塔", [-4, -1]], 
                ["丁滿", [-1, 4]], 
                ["弗利沙", [4, -1]]
            ]);
            let resultMap = new Map();
            let minDist = Number.MAX_SAFE_INTEGER;
            let maxDist = 0;

            // pair the characters with distances
            for(let [key, value] of chrcoord.entries()) {
                let dist = Math.abs(chrcoord.get(name)[0]-chrcoord.get(key)[0]) + Math.abs(chrcoord.get(name)[1]-chrcoord.get(key)[1]);
                // determine whether above or below the line through (3, -2), (-1, 3) 5x+4y-7=0
                if ((5*chrcoord.get(name)[0]+4*chrcoord.get(name)[1]-7>0 && 5*chrcoord.get(key)[0]+4*chrcoord.get(key)[1]-7<0) || (5*chrcoord.get(name)[0]+4*chrcoord.get(name)[1]-7<0 && 5*chrcoord.get(key)[0]+4*chrcoord.get(key)[1]-7>0)) {
                    dist+=2;
                }
                if (!resultMap.has(dist)) {
                    resultMap.set(dist,[]);
                }
                resultMap.get(dist).push(key);
            }

            // Find max distance and min distance
            for(let [key, value] of resultMap.entries()) {
                if(key < minDist && key != 0) {
                    minDist = key;
                }
                if(key > maxDist) {
                    maxDist = key;
                }
            }
            console.log("最遠%s;最近%s", resultMap.get(maxDist).join("、"), resultMap.get(minDist).join("、"));
        }



        console.log("==========Task 1==========");
        func1("辛巴");
        func1("悟空");
        func1("弗利沙");
        func1("特南克斯");

        // task 2
        let schedule = null;
        function func2(ss, start, end, criteria) {
            // Check whether a service is free during the given time range
            function isAvailable(t, start, end) {
                let i;
                return schedule[t].slice(start, end).every(i => i === false);
            }

            // Find the available service closest to the given value
            function findClosest(ss, key, op, value, start, end) {
                let clsestIdx = null;
                let clsestSub = Number.MAX_SAFE_INTEGER;

                for(let i = 0; i < ss.length; i++) {
                    let currentValue = ss[i][key];
                    
                    // Filter by comparison operator
                    if(op == ">=" && currentValue < value)
                        continue;
                    else if(op == "<=" && currentValue > value)
                        continue;
                    else if(op == "=" && currentValue != value)
                        continue;

                    // Skip unavailable service
                    if(!isAvailable(i, start, end))
                        continue;

                    // Compare distance from target value
                    let sub = Math.abs(currentValue - value);
                    if(sub < clsestSub) {
                        clsestSub = sub;
                        clsestIdx = i;
                    }
                }
                return clsestIdx;
            }

            // Parse criteria string into key, operator, and value
            function parseCriteria(criteria) {
                if(criteria[0] == 'n') {
                    return ["name", "=", criteria.slice(5)];
                }
                else if(criteria[0] == 'r') {
                    if (criteria[1] == '=')
                        return ['r', '=', criteria.slice(2)];
                    return ['r', criteria.slice(1,3), (criteria.slice(3))];
                }
                else if(criteria[0] == 'c') {
                    if (criteria[1] == '=')
                        return ['c', '=', criteria.slice(2)];
                    return ['c', criteria.slice(1,3), criteria.slice(3)];
                }
                else return null;
            }
            // func 2 initialize schedule table
            if(schedule === null) {
                schedule = [];
                for (let i = 0; i < ss.length; i++) {
                    schedule.push(Array(24).fill(false));
                }
            }

            let parseArr = parseCriteria(criteria);

            // Invalid criteria format
            if(parseArr === null)
                console.log("Error!")
            else {
                // Search by service name
                if (parseArr[0] === "name") {
                    for(let i = 0; i < ss.length; i++) {
                        if (ss[i]["name"] === parseArr[2] && isAvailable(i, start, end)) {
                            console.log(ss[i]["name"]);

                            // Mark time range as occupied
                            for(let j = start; j < end; j++) {
                                schedule[i][j] = true;
                            }
                            return null;
                        }
                    }
                    console.log("Sorry");
                    return null;
                }
                else {
                    // Search by rating or cost
                    let idx = findClosest(ss, parseArr[0], parseArr[1], parseArr[2], start, end);

                    if(idx === null) {
                        console.log("Sorry");
                        return null;
                    }
                    // Mark time range as occupied
                    for(let i = start; i < end; i++) {
                        schedule[idx][i] = true;
                    }
                    
                    console.log(ss[idx]["name"]);
                    return null;
                }
            }
        }


        const services=[
            {"name":"S1", "r":4.5, "c":1000},
            {"name":"S2", "r":3, "c":1200},
            {"name":"S3", "r":3.8, "c":800}
        ];
        console.log("==========Task 2==========");
        func2(services, 15, 17, "c>=800"); // S3
        func2(services, 11, 13, "r<=4"); // S3
        func2(services, 10, 12, "name=S3"); // Sorry
        func2(services, 15, 18, "r>=4.5"); // S1
        func2(services, 16, 18, "r>=4"); // Sorry
        func2(services, 13, 17, "name=S1"); // Sorry
        func2(services, 8, 9, "c<=1500"); // S2

        // task 3
        function func3(index) {
            // The rule of number sequence : (-2, -3, +1, +2)*n
            let num = 25;

            switch(index%4) {
                case 0:
                    console.log(num - 2*(Math.trunc(index/4)));
                    break;
                case 1:
                    console.log(num - 2*(Math.trunc(index/4)) - 2);
                    break;
                case 2:
                    console.log(num - 2*(Math.trunc(index/4)) - 5);
                    break;
                case 3:
                    console.log(num - 2*(Math.trunc(index/4)) - 4);
                    break;
                default:
                    console.log("Error!")
            }
        }
        console.log("==========Task 3==========")
        func3(1);
        func3(5);
        func3(10);
        func3(30);

        // task 4
        function func4(sp, stat, n) {
            let minSp = Number.MAX_SAFE_INTEGER;
            let minSpIdx = -1;

            for(let i = 0; i < sp.length; i++) {
                if (stat[i] === '0' && sp[i] >= n && sp[i] < minSp) {
                    minSp = sp[i];
                    minSpIdx = i;
                }
            }
            if(minSpIdx != -1) {
                console.log(minSpIdx);
            }
            else {
                // new variable declartion
                let maxSp = 0;
                let maxSpIdx = -1;

                for(let i = 0; i < sp.length; i++) {
                    if(stat[i] === '0' && sp[i] > 0) {
                        if(sp[i] > maxSp) {
                            maxSpIdx = i;
                            maxSp = sp[i];
                        }
                    }
                }
                if (maxSpIdx != -1) {
                    console.log(maxSpIdx);
                }
                else {
                    console.log("Error!")
                }
            }
        }
        console.log("==========Task 4==========");
        func4([3, 1, 5, 4, 3, 2], "101000", 2);
        func4([1, 0, 5, 1, 3], "10100", 4);
        func4([4, 6, 5, 8], "1000", 4);
    </script>
